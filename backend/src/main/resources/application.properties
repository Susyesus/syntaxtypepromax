spring.application.name=demo

# Database (Supabase)
# Override these via env vars in any non-local-dev environment.
# DB_PASSWORD has no default on purpose: set it via env var to actually connect.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres.cnbznzbyeqkebgjpniud}
spring.datasource.password=${DB_PASSWORD:uHxCf3X02h3eJwyX}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=HikariCP

# Server
server.port=${PORT:8080}

# JWT
# DEV-ONLY default below. Override JWT_SECRET via env var in any shared/deployed environment.
jwt.secret=${JWT_SECRET:dev-only-local-secret-please-rotate-in-prod-32+chars}
jwt.expiration=${JWT_EXPIRATION:900000}

# Admin bootstrap (initial setup only)
# DEV-ONLY default below. Override ADMIN_PASSWORD via env var anywhere else.
admin.username=${ADMIN_USERNAME:admin}
admin.email=${ADMIN_EMAIL:admin@example.com}
admin.password=${ADMIN_PASSWORD:changeme}

# CORS (frontend origin) — default lives in SecurityConfig.java's @Value;
# override by setting the FRONTEND_URL env var (comma-separated for multiple).

# Logging
logging.level.org.apache.catalina=DEBUG
logging.level.org.springframework.web.filter=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.backend=DEBUG
